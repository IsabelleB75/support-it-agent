version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.7.0
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    - _PIP_ADDITIONAL_REQUIREMENTS=evidently pandas sqlalchemy psycopg2-binary pyarrow xgboost scikit-learn mlflow joblib sentence-transformers
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=Rw2o1IbE4JxxC1Vg-HRrraK47lqJP_CbIl2fqmxi0Zk=
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__WEBSERVER__SECRET_KEY=your_secret_key_here
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./mlruns:/opt/airflow/mlruns
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  airflow-postgres:
    image: postgres:15
    container_name: support_airflow_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - support_airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: support_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: support_airflow_webserver
    command: webserver
    ports:
      - "8082:8080"  # Port 8082 pour éviter conflit avec fraud (8081)
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    container_name: support_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: support_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlruns/mlflow.db --default-artifact-root /mlflow/mlruns
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  support_airflow_postgres_data:
